<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inder&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer ></script>
</head>
<body>
    <header>
        <img src="./imagens/logo.png" alt="Logo do Quicklist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" placeholder="Adicione um novo item" id="novo-item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="itens">
            <div class="item">
                <div>
                    <input type="checkbox" id="item-1">

                    <div class="checkbox-customizada">
                        <img src="./imagens/checked.svg" alt="checked">
                    </div>
                    
                    <label for="item-1">Pão de forma</label>
                </div>

                <button>
                    <img src="./imagens/trash-icon.svg" alt="item do lixo">
                </button>
            </div>
        </section>
    </main>
</body>
</html>
